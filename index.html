<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA: tells iOS Safari this is an app, not a website -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent lets the app draw behind the status bar for edge-to-edge display -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="greenroom" />
    <!-- Theme color sets the browser chrome / status bar color on Android + Safari -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />

    <title>greenroom</title>

    <!-- PWA manifest — tells the browser about installability, icons, display mode -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Apple touch icon — the icon shown on the iOS home screen (180x180 is the required size) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker for offline caching -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
